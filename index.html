<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sunfara — Premium organic & wellness brand. Pure. Natural. Conscious." />
  <meta property="og:title" content="Sunfara — Pure. Natural. Conscious." />
  <meta property="og:description" content="Certified organic skincare, herbal haircare, and eco-conscious personal care." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <title>Sunfara — Pure. Natural. Conscious.</title>

  <!-- CSS: load order matters — variables first, then structure, then components -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/product-list.css" />
  <link rel="stylesheet" href="css/product-detail.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <link rel="stylesheet" href="css/checkout.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/orders.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/wishlist.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div id="app">
    <!-- Dismissable offer bar -->
    <div id="offer-bar">
      🌿 Free shipping on orders above ₹599 | Use code <strong>WELCOME10</strong> for 10% off your first order
      <span class="close-offer" onclick="document.getElementById('offer-bar').style.display='none'" aria-label="Close offer bar">✕</span>
    </div>

    <!-- Navbar injected by navbar.js -->
    <nav id="navbar"></nav>

    <!-- SPA page content — router swaps this out on every navigation -->
    <main id="page-content"></main>

    <!-- Footer injected by footer.js -->
    <footer id="footer"></footer>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true"></div>

  <!-- Search dropdown (positioned inside navbar via JS) -->
  <div id="search-dropdown"></div>

  <!-- Cart slide-in drawer -->
  <div id="cart-drawer" class="drawer" role="complementary" aria-label="Shopping cart"></div>
  <div id="cart-drawer-overlay" class="drawer-overlay"></div>

  <!-- Wishlist slide-in drawer -->
  <div id="wishlist-drawer" class="drawer" role="complementary" aria-label="Wishlist"></div>
  <div id="wishlist-drawer-overlay" class="drawer-overlay"></div>

  <!-- Back to top button -->
  <button id="back-to-top" aria-label="Back to top">↑</button>

  <!-- Firebase Configuration -->
  <script type="module">
    import { app, analytics, auth, database, storage, db } from "./js/firebase-config.js";
    // Firebase is now initialized and available globally
    window.firebase = { app, analytics, auth, database, storage, db };
  </script>

  <!-- JS load order: utils → data → store → components → pages → router (last) -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/skeleton.js"></script>
  <script src="js/components/search.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/footer.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/product-list.js"></script>
  <script src="js/pages/product-detail.js"></script>
  <script src="js/pages/cart.js"></script>
  <script src="js/pages/checkout.js"></script>
  <script src="js/pages/auth.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/wishlist.js"></script>
  <script src="js/pages/about.js"></script>
  <script src="js/pages/certifications.js"></script>
  <script src="js/pages/blog.js"></script>
  <script src="js/pages/faq.js"></script>
  <script src="js/pages/contact.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
